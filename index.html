<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Arcade | Unblocked Games Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f1a, #020408);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            min-height: 100vh;
            color: #f0f3fa;
            overflow-x: hidden;
        }

        /* animated cyber grid */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridPulse 12s infinite alternate;
        }

        @keyframes gridPulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }

        /* scanning line */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, cyan, magenta, cyan, transparent);
            filter: blur(2px);
            animation: scanVertical 10s linear infinite;
            pointer-events: none;
            z-index: 200;
            opacity: 0.5;
        }

        @keyframes scanVertical {
            0% { transform: translateY(0vh); opacity: 0; }
            10% { opacity: 0.8; }
            30% { transform: translateY(30vh); opacity: 0.6; }
            50% { transform: translateY(50vh); opacity: 0.9; }
            70% { transform: translateY(70vh); opacity: 0.5; }
            90% { transform: translateY(95vh); opacity: 0.7; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
            z-index: 10;
        }

        /* header with glitch effect */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeSlideDown 0.8s ease-out;
        }

        .hero h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #fff, #4effe6, #ff4eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.75;
            backdrop-filter: blur(4px);
            margin-top: 0.5rem;
        }

        .status-badge {
            display: inline-flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .badge {
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* game grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 3rem 0;
        }

        /* game card premium */
        .game-card {
            background: rgba(8, 18, 28, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            border: 1px solid rgba(0, 200, 255, 0.2);
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            cursor: pointer;
            transform: translateY(0);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 230, 250, 0.8);
            box-shadow: 0 25px 40px -12px rgba(0, 200, 255, 0.3);
        }

        .game-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #0b1422, #01050c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: transform 0.4s ease;
        }

        .game-card:hover .game-img {
            transform: scale(1.05);
        }

        .game-info {
            padding: 1.2rem;
        }

        .game-title {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #f0f9ff, #a0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .play-btn {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.35rem 1.2rem;
            background: rgba(0, 200, 255, 0.15);
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .game-card:hover .play-btn {
            background: cyan;
            color: #0a0f1a;
            box-shadow: 0 0 12px cyan;
        }

        /* modal glassmorph */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(1, 5, 14, 0.92);
            backdrop-filter: blur(24px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-card {
            width: 92%;
            max-width: 1300px;
            height: 85vh;
            background: #060c16;
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: scaleUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            background: rgba(10, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid cyan;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            width: 42px;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: cyan;
            transform: rotate(90deg);
            text-shadow: 0 0 8px cyan;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.45;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            padding-top: 2rem;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2rem; }
            .game-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .game-title { font-size: 1rem; }
        }
    </style>
</head>

    function renderGames() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        for (let game of GAMES_DB) {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-img" style="flex-direction: column; gap: 8px;">
                    <span style="font-size: 3.8rem; filter: drop-shadow(0 0 6px cyan);">${game.icon}</span>
                    <span style="font-size: 0.7rem; background: rgba(0,200,255,0.2); padding: 2px 14px; border-radius: 30px;">PLAY NOW ▶</span>
                </div>
                <div class="game-info">

                    <div style="font-size: 0.7rem; opacity: 0.65; margin: 4px 0;">${game.desc}</div>
                    <div class="play-btn">Launch →</div>
                </div>
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                openGameModal(game);
            });
            grid.appendChild(card);
        }
    }

    function openGameModal(game) {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameFrame');
        const titleEl = document.getElementById('modalTitle');
        if (!modal || !iframe) return;

        let gameUrl = game.url;
        if (!gameUrl.startsWith('http')) gameUrl = 'https://' + gameUrl;
        
        iframe.src = gameUrl;
        titleEl.innerHTML = `${game.icon} ${game.name}`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameFrame');
        if (modal && iframe) {
            modal.style.display = 'none';
            iframe.src = 'about:blank';
            document.body.style.overflow = 'auto';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderGames();
        
        const modal = document.getElementById('gameModal');
        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal && modal.style.display === 'flex') {
                closeModal();
            }
        });
    });
</script>
