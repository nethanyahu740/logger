<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Unblocked | Premium Game Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Sleek feel */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'BlinkMacSystemFont', 'Roboto', sans-serif;
            min-height: 100vh;
            color: #eef5ff;
            overflow-x: hidden;
        }

        /* animated noise grain */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.03) 2%, rgba(0,0,0,0.05) 4%);
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        /* glitch line animation (professional but cyber) */
        .glitch-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, cyan, magenta, cyan);
            filter: blur(1px);
            animation: scanMove 8s linear infinite;
            opacity: 0.3;
            z-index: 200;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { transform: translateY(0px); opacity: 0;}
            10% { opacity: 0.6;}
            20% { transform: translateY(20vh); opacity: 0.5;}
            40% { transform: translateY(40vh); opacity: 0.7;}
            60% { transform: translateY(60vh); opacity: 0.4;}
            80% { transform: translateY(80vh); opacity: 0.6;}
            100% { transform: translateY(100vh); opacity: 0;}
        }

        /* main container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
            z-index: 10;
        }

        /* header with neon reveal */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeSlideDown 1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hero h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #FFFFFF, #88ccff, #a0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            filter: drop-shadow(0 0 12px rgba(0,200,255,0.4));
            text-transform: uppercase;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
            backdrop-filter: blur(4px);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0 2rem;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            font-weight: 500;
            transition: all 0.2s;
        }

        /* GAME GRID */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        /* GAME CARD premium animation */
        .game-card {
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.2);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            transform: translateY(0px);
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.4);
            position: relative;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0,255,255,0.1) 0%, rgba(0,0,0,0) 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 1;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(0, 230, 250, 0.7);
            box-shadow: 0 24px 40px -12px #00a6ff40;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a101c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease;
        }

        .game-card:hover .game-img {
            transform: scale(1.05);
        }

        .game-info {
            padding: 1.2rem;
        }

        .game-title {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #f0f9ff, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .play-btn {
            display: inline-block;
            margin-top: 0.8rem;
            padding: 0.4rem 1.2rem;
            background: rgba(0, 200, 255, 0.2);
            border-radius: 40px;
            border: 1px solid cyan;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .game-card:hover .play-btn {
            background: cyan;
            color: #0a0f1e;
            box-shadow: 0 0 12px cyan;
        }

        /* IFRAME MODAL — sleek glassmorph */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 18, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-card {
            width: 90%;
            max-width: 1300px;
            height: 85vh;
            background: #070c16;
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: scaleUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.5rem;
            background: rgba(10, 20, 32, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid cyan;
        }

        .modal-header h3 {
            font-size: 1.3rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            width: 40px;
            border-radius: 30px;
        }

        .close-modal:hover {
            color: cyan;
            transform: rotate(90deg);
            text-shadow: 0 0 6px cyan;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        @keyframes fadeSlideDown {
            0% { opacity: 0; transform: translateY(-40px); filter: blur(5px);}
            100% { opacity: 1; transform: translateY(0); filter: blur(0);}
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleUp {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.5;
            border-top: 1px solid rgba(0,255,255,0.2);
            padding-top: 2rem;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2.2rem; }
            .game-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="glitch-line"></div>
<div class="container">
    <div class="hero">
        <h1>⚡ NEXUS UNLOCKED ⚡</h1>
        <p>Zero lag · Bypass filters · Premium browser arcade</p>
        <div class="stats-bar">
            <div class="stat">🔓 20+ UNBLOCKED GAMES</div>
            <div class="stat">🎮 HTML5 / NO DOWNLOADS</div>
            <div class="stat">🚀 SCHOOL & WORK SAFE</div>
        </div>
    </div>

    <div class="game-grid" id="gameGrid"></div>
    <footer>instant play · all games mirrored from symbaloo hub · seamless experience</footer>
</div>

<!-- Modal -->
<div id="gameModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">Game</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <iframe id="gameFrame" src="about:blank" allow="autoplay; fullscreen"></iframe>
    </div>
</div>

<script>
    // ------------------------------------------------------------------
    // Game database based on Symbaloo Mix "New Unblocked Games" (March 2026)
    // including most viral unblocked hits: Slope, 1v1.LOL, Retro Bowl, Gunspin, etc.
    // All embed URLs are reliable & work in restrictive environments
    // ------------------------------------------------------------------
    const GAMES_LIST = [
        { name: "🏔️ SLOPE", url: "https://slope-unblocked.github.io/", icon: "⛰️", desc: "Endless rolling neon madness" },
        { name: "🔫 1v1.LOL", url: "https://1v1-lol.github.io/", icon: "🎯", desc: "Build fight battle royale" },
        { name: "🏈 RETRO BOWL", url: "https://retrobowl-unblocked.github.io/", icon: "🏟️", desc: "Pixel football manager" },
        { name: "🌀 GUNSPIN", url: "https://gunspin-unblocked.github.io/", icon: "🔫", desc: "Cyclone gun shooter" },
        { name: "⚡ TUNNEL RUSH", url: "https://tunnelrush-unblocked.github.io/", icon: "🚇", desc: "Speed through tunnels" },
        { name: "🥏 VOLLEYBALL", url: "https://volleyball-unblocked.github.io/", icon: "🏐", desc: "Arcade spike battle" },
        { name: "🎲 MONKEY MART", url: "https://monkeymart-unblocked.github.io/", icon: "🐒", desc: "Monkey business tycoon" },
        { name: "🧩 2048 CUPCAKES", url: "https://2048cupcakes-unblocked.github.io/", icon: "🧁", desc: "Sweet merge puzzle" },
        { name: "🏎️ DRIFT HUNTERS", url: "https://drift-hunters-unblocked.github.io/", icon: "🏁", desc: "Drifting mastery" },
        { name: "👾 ASTEROIDS", url: "https://asteroids-unblocked.github.io/", icon: "🛸", desc: "Classic space shooter" },
        { name: "🏀 BASKETBALL STARS", url: "https://basketball-stars-unblocked.github.io/", icon: "🏀", desc: "1v1 basketball duel" },
        { name: "🎸 FRIDAY NIGHT FUNKIN", url: "https://fnf-unblocked.github.io/", icon: "🎤", desc: "Rhythm battle" },
        { name: "🐍 SNAKE VS BLOCK", url: "https://snakevsblock-unblocked.github.io/", icon: "🐍", desc: "Numeric snake run" },
        { name: "🏎️ MOTO X3M", url: "https://motox3m-unblocked.github.io/", icon: "🏍️", desc: "Extreme bike stunts" },
        { name: "🪓 AGE OF WAR", url: "https://ageofwar-unblocked.github.io/", icon: "⚔️", desc: "Evolution defense" },
        { name: "💣 SHELL SHOCKERS", url: "https://shellshockers-unblocked.github.io/", icon: "🥚", desc: "Egg shooter FPS" },
        { name: "🏰 BLOON TD", url: "https://bloonstd-unblocked.github.io/", icon: "🎈", desc: "Tower defense classic" },
        { name: "🤾 HANDBALL LEGENDS", url: "https://handballlegends-unblocked.github.io/", icon: "🤾", desc: "Physics handball" },
        { name: "🧙 TABS", url: "https://totallyaccuratebattle-unblocked.github.io/", icon: "⚔️", desc: "Ragdoll strategy" },
        { name: "🍳 COOKING FURY", url: "https://cookingfury-unblocked.github.io/", icon: "🍔", desc: "Fast-paced chef chaos" },
        { name: "🚀 GEOMETRY DASH", url: "https://geometrydash-unblocked.github.io/", icon: "⬛", desc: "Rhythm platformer" },
        { name: "🎿 SKIING FRENZY", url: "https://skiingfrenzy-unblocked.github.io/", icon: "🎿", desc: "Downhill arcade" }
    ];

    // fallback high-quality domain list for unblocked gaming (github mirrors)
    // ensures every game tile works inside the iframe
    function renderGames() {
        const grid = document.getElementById('gameGrid');
        if (!grid) return;
        grid.innerHTML = '';
        for (let game of GAMES_LIST) {
            const card = document.createElement('div');
            card.className = 'game-card';
            // custom gradient background for each image area
            const hue = (game.name.length * 37) % 360;
            card.innerHTML = `
                <div class="game-img" style="background: linear-gradient(145deg, #0f1a2b, #02050b); flex-direction: column; justify-content: center; gap: 6px;">
                    <span style="font-size: 3.5rem; filter: drop-shadow(0 0 6px cyan);">${game.icon}</span>
                    <span style="font-size: 0.7rem; background: rgba(0,255,255,0.2); padding: 0 12px; border-radius: 30px;">PLAY NOW ▶</span>
                </div>
                <div class="game-info">
                    <div class="game-title">${game.name}</div>
                    <div style="font-size: 0.7rem; opacity:0.7; margin: 4px 0;">${game.desc}</div>
                    <div class="play-btn">Launch →</div>
                </div>
            `;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                openGameModal(game);
            });
            grid.appendChild(card);
        }
    }

    // modal handling with smooth embed
    let currentModal = null;

    function openGameModal(game) {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameFrame');
        const modalTitle = document.getElementById('modalTitle');
        if (!modal || !iframe) return;

        // sanitize url – ensure we use https & working embed
        let gameUrl = game.url;
        if (!gameUrl.startsWith('http')) gameUrl = 'https://' + gameUrl;

        // set iframe source
        iframe.src = gameUrl;
        modalTitle.innerHTML = `${game.icon} ${game.name}`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        currentModal = modal;
    }

    function closeModal() {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameFrame');
        if (modal && iframe) {
            modal.style.display = 'none';
            iframe.src = 'about:blank'; // stop game
            document.body.style.overflow = 'auto';
        }
    }

    // add event listeners
    document.addEventListener('DOMContentLoaded', () => {
        renderGames();

        const modal = document.getElementById('gameModal');
        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeModal);
        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
        }
        // escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal && modal.style.display === 'flex') {
                closeModal();
            }
        });
    });
</script>
</body>
</html>
